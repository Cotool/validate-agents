# CI for the validate-agents Action.
#
# NOTE: while this lives inside the cogent-client monorepo as a prototype, GitHub only
# runs workflows from the repo *root* `.github/workflows/`, so this file is dormant here.
# On promotion to the public `cotool/validate-agents` repo (where action.yml sits at the
# root) it becomes the active CI. No path changes are needed.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # dist drift check: the committed bundle must match a fresh build.
      - name: Verify dist is up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            git --no-pager diff -- dist
            exit 1
          fi
