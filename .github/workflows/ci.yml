# CI for the validate-agents Action: build, typecheck, tests, and a dist drift check
# (the committed dist/index.js bundle must match a fresh `npm run build`).
name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # dist drift check: the committed bundle must match a fresh build.
      - name: Verify dist is up to date
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            echo "::error::dist/ is out of date. Run 'npm run build' and commit the result."
            git --no-pager diff -- dist
            exit 1
          fi
