# This repository does not accept external contributions — PRs are limited to the Cotool
# team. GitHub can't prevent an outsider from opening a fork PR on a public repo, so this
# workflow politely closes any PR whose author lacks write access to the repo.
#
# Why the repo-permission endpoint (not /orgs/{org}/members): the ephemeral GITHUB_TOKEN is
# not itself an org member, so /orgs/{org}/members/{user} only sees *public* members and
# returns 404 for members whose org membership is private — closing their legit PRs. The
# collaborators/{user}/permission endpoint instead reports the author's *effective* repo
# access (admin/write/triage/read/none), which is unaffected by membership visibility.
# On a public repo every user resolves to at least `read`, so we treat write/admin as the
# team and read/none as external.
#
# Safety: it uses `pull_request_target` (so the GITHUB_TOKEN can write to the PR) but never
# checks out or runs the PR's code — it only reads event metadata and calls the PR API.
# Token scope is limited to `pull-requests: write` (+ `contents: read` for the API read).
name: close-external-prs

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  close:
    runs-on: ubuntu-latest
    # Fast-path: skip authors GitHub already reports as team. This is only an optimization —
    # author_association reports private org members as CONTRIBUTOR/NONE, so the access check
    # below is the source of truth for anyone who falls through.
    if: >-
      github.event.pull_request.author_association != 'OWNER' &&
      github.event.pull_request.author_association != 'MEMBER' &&
      github.event.pull_request.author_association != 'COLLABORATOR'
    steps:
      - name: Check repo access
        id: access
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          perm="$(gh api "/repos/$GITHUB_REPOSITORY/collaborators/$AUTHOR/permission" \
            --jq '.permission' 2>/dev/null || echo error)"
          case "$perm" in
            admin|write)
              echo "member=true"  >> "$GITHUB_OUTPUT" ;;
            read|none)
              echo "member=false" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "::warning::Could not resolve repo access for $AUTHOR (got '$perm'); leaving PR open."
              echo "member=unknown" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Comment and close
        if: steps.access.outputs.member == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" --body \
            "Thanks for your interest! This repository does not accept external contributions — pull requests are limited to the Cotool team, so this PR is being closed automatically. If you've found a bug or have a request, please open an issue instead."
          gh pr close "$PR" --repo "$GITHUB_REPOSITORY"
